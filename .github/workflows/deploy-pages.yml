# Publish the static site to GitHub Pages.
# Canonical URL: https://iee.smmiri.com/
#
# FIRST-TIME SETUP:
#   Repo -> Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#   Repo -> Settings -> Pages -> Custom domain: iee.smmiri.com (the CNAME file also sets this)
#   Cloudflare DNS (zone smmiri.com): CNAME  iee -> smmiri.github.io  (DNS only / grey cloud)
#   Then enable "Enforce HTTPS" once the certificate is issued.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub-hosted actions run on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp CNAME _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp .nojekyll _site/
          test -f _site/index.html
          test -f _site/CNAME
          ls -la _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
