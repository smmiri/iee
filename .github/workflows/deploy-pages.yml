# Publish the static site to GitHub Pages.
# Canonical URL: https://iee.smmiri.com/
#
# The "Configure GitHub Pages" step below uses `enablement: true`, so it turns Pages on
# automatically the first time (no need to visit Settings -> Pages first). This fixes the
# "Get Pages site failed ... Not Found" error on a fresh repo.
#
# DNS: add a CNAME record `iee -> smmiri.github.io` (DNS only, no proxy), then enable
# "Enforce HTTPS" in Settings -> Pages once the certificate is issued.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub-hosted actions run on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  # Keep false: cancel-in-progress can abort an in-flight Pages deployment and
  # surface as "Deploy to GitHub Pages" failures even when the artifact is fine.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp favicon.ico _site/
          cp favicon.svg _site/
          cp favicon-16.png _site/
          cp favicon-32.png _site/
          cp apple-touch-icon.png _site/
          cp og-image.png _site/
          cp CNAME _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp .nojekyll _site/
          test -f _site/index.html
          test -f _site/CNAME
          ls -la _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 900000
          error_count: 15
          reporting_interval: 10000
